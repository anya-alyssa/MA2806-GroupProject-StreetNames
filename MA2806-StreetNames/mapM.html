<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="sketch.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
}

#map {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="map"></div>

<script>
const map = L.map('map').setView([51.505, -0.09], 13);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

map.on('click', function (e) {
    alert("You clicked the map at " + e.latlng);
});

const marker = L.marker([51.5, -0.09]).addTo(map)
    .bindPopup('<b>Hello world!</b><br />I am a popup.').openPopup();

/* using https://leafletjs.com/examples/custom-icons/ */

var icon = L.Icon.extend({
  options: {
    iconSize: [50, 50],
    iconAnchor: [25, 50],
    popupAnchor: [0, -50]
  }
});

var streathamIcon = new icon({iconUrl: 'assets/placeholderIcon.png'}),
    edmontonIcon = new icon({iconUrl: 'assets/placeholderIcon.png'}),
    newhamIcon = new icon({iconUrl: 'assets/placeholderIcon.png'});

L.marker([51.506606, -0.126686], {icon: streathamIcon}).addTo(map).bindPopup('I am an icon');
</script>

</body>
</html>
