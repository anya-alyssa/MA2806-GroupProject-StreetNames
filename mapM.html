<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="sketch.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
}

#map {
  position: absolute;
  width: 100%;
  height: 100%;
  z-index: 0;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
  pointer-events: none;
}

.male-icon {
  opacity: 0.8;
}
</style>
</head>

<body>

<div id="map"></div>

<script>
const map = L.map('map').setView([51.505, -0.09], 10);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

map.on('click', function (e) {
    alert("You clicked the map at " + e.latlng);
});



/* using https://leafletjs.com/examples/custom-icons/ */

var icon = L.Icon.extend({
  options: {
    iconSize: [40, 50],
    iconAnchor: [20, 50],
    popupAnchor: [0, -50],
    className: 'male-icon'
  }
});

var streathamIcon = new icon({iconUrl: 'assets/streathamM.png'}),
    streathamIconBlack = new icon({iconUrl: 'assets/streatham.png'}),
    edmontonIcon = new icon({iconUrl: 'assets/edmontonM.png'}),
    edmontonIconBlack = new icon({iconUrl: 'assets/edmonton.png'}),
    newhamIcon = new icon({iconUrl: 'assets/newhamM.png'});
    newhamIconBlack = new icon({iconUrl: 'assets/newham.png'});

/* STREATHAM MARKERS - ANYA 
L.marker([51.429611, -0.131149], {icon: streathamIcon}).addTo(map).bindPopup('Streatham'); */

/* EDMONTON MARKERS - LEVY 
L.marker([51.626329, -0.080681], {icon: edmontonIcon}).addTo(map).bindPopup('Edmonton'); */

/* NEWHAM MARKERS - JOY 
L.marker([51.520066, 0.059052], {icon: newhamIcon}).addTo(map).bindPopup('Newham'); */

fetch('data/Mmarkers.json')
    .then(response => response.json())
    .then(data => {
        data.forEach(location => {
          let chosenIcon;

          if (location.icon === "streatham") {
            chosenIcon = streathamIcon;
          } else if (location.icon === "edmonton") {
            chosenIcon = edmontonIcon;
          } else if (location.icon === "newham") {
            chosenIcon = newhamIcon;
          } else if (location.icon === "streathamBlack") {
            chosenIcon = streathamIconBlack;
          } else if (location.icon === "edmontonBlack") {
            chosenIcon = edmontonIconBlack;
          } else if (location.icon === "newhamBlack") {
            chosenIcon = newhamIconBlack;
          }

            L.marker([location.lat, location.lng], {icon: chosenIcon}).addTo(map).bindPopup(location.popup);
        });
    })
    .catch(error => console.error('Error loading markers:', error));

</script>

</body>
</html>
